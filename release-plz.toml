[workspace]
# Disable crates.io publishing — releases are GitHub-only
publish = false

# Disable semver checks (not publishing to crates.io)
semver_check = false

# Enable changelog generation for all releasable crates
changelog_update = true

# Enable git tags and GitHub releases
git_tag_enable = true
git_release_enable = true

# PR configuration
pr_labels = ["release"]
pr_draft = false

# Use features_always_increment_minor so that `feat:` commits bump minor
# even for 0.x crates (otherwise they'd only bump patch)
features_always_increment_minor = true

# Protect breaking change commits from being filtered out of changelogs
[changelog]
protect_breaking_commits = true

# Exclude zed-json-sort — it's a WASM extension, not released
[[package]]
name = "zed-json-sort"
release = false
changelog_update = false
git_release_enable = false
git_tag_enable = false

# json-sort library crate
[[package]]
name = "json-sort"

# json-sort-server LSP binary crate
[[package]]
name = "json-sort-server"
