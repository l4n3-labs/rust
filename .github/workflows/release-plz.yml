name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  # Create git tags and GitHub releases when the release PR is merged
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'l4n3-labs' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Open/update a release PR with version bumps and changelogs
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'l4n3-labs' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz@0.3.157
      - name: Configure git
        run: |
          git config --global user.name "release-plz[bot]"
          git config --global user.email "release-plz[bot]@users.noreply.github.com"
      - name: Run release-plz release-pr (debug)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PLZ_LOG: debug
        run: |
          echo "=== git tags ==="
          git tag -l
          echo "=== running release-plz ==="
          release-plz release-pr --git-token "$GITHUB_TOKEN" -vvv -o json 2>&1 | tee /tmp/release-plz-output.txt
          echo "=== done ==="
