name: Create Release Tags

on:
  pull_request:
    types: [closed]

jobs:
  release-tags:
    if: github.event.pull_request.merged == true && github.head_ref == 'release/automated' && github.repository_owner == 'l4n3-labs'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create tags and GitHub releases
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Use app token for git push so tag events trigger downstream workflows
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          for crate in json-sort json-sort-server; do
            echo "::group::Processing ${crate}"

            # Read version from Cargo.toml
            VERSION=$(grep -m1 '^version = ' "crates/${crate}/Cargo.toml" | sed 's/version = "\(.*\)"/\1/')
            if [ -z "${VERSION}" ]; then
              echo "  ERROR: Could not read version from crates/${crate}/Cargo.toml"
              exit 1
            fi
            echo "  Version from Cargo.toml: ${VERSION}"

            TAG="${crate}-v${VERSION}"
            echo "  Tag: ${TAG}"

            # Check if tag already exists
            if git tag -l "${TAG}" | grep -q "${TAG}"; then
              echo "  Tag ${TAG} already exists, skipping."
              echo "::endgroup::"
              continue
            fi

            # Extract release notes from CHANGELOG.md
            # Get the section between the version header and the next "## [" header
            CHANGELOG_FILE="crates/${crate}/CHANGELOG.md"
            if [ -f "${CHANGELOG_FILE}" ]; then
              echo "  Extracting release notes from ${CHANGELOG_FILE}..."
              NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p}" "${CHANGELOG_FILE}")
              if [ -z "${NOTES}" ]; then
                echo "  WARNING: No release notes found for version ${VERSION}, using default message."
                NOTES="Release ${TAG}"
              fi
            else
              echo "  WARNING: ${CHANGELOG_FILE} not found, using default message."
              NOTES="Release ${TAG}"
            fi

            echo "  Creating and pushing tag ${TAG}..."
            git tag "${TAG}"
            git push origin "${TAG}"

            echo "  Creating GitHub release for ${TAG}..."
            gh release create "${TAG}" --title "${TAG}" --notes "${NOTES}" --prerelease

            echo "  Done with ${crate}."
            echo "::endgroup::"
          done
