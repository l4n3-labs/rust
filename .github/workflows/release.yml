name: Release JSON Sort Server

on:
  push:
    tags: ["json-sort-server-v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p json-sort-server
          else
            cargo build --release --target ${{ matrix.target }} -p json-sort-server
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf json-sort-server-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release json-sort-server

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: 7z a json-sort-server-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/json-sort-server.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: json-sort-server-${{ matrix.target }}
          path: json-sort-server-${{ matrix.target }}.*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: false
          files: |
            json-sort-server-*.tar.gz
            json-sort-server-*.zip
