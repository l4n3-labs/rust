name: Release PR

on:
  push:
    branches: [main]

jobs:
  release-pr:
    if: github.repository_owner == 'l4n3-labs' && !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"

      - name: Determine version bumps and update changelogs
        id: bump
        run: |
          set -euo pipefail

          ANY_BUMPED="false"

          for crate in json-sort json-sort-server; do
            echo "::group::Processing ${crate}"

            echo "Getting bumped version for ${crate}..."
            BUMPED_TAG=$(git cliff --tag-pattern "^${crate}-v" --include-path "crates/${crate}/**" --bumped-version 2>/dev/null || true)
            echo "  Bumped tag: ${BUMPED_TAG}"

            # git-cliff outputs the full tag (e.g. json-sort-server-v1.0.0) — extract bare version
            BUMPED_BARE="${BUMPED_TAG#${crate}-v}"
            echo "  Bumped version: ${BUMPED_BARE}"

            # Get current version from the latest matching tag
            LATEST_TAG=$(git tag -l "${crate}-v*" --sort=-v:refname | head -n1 || true)
            if [ -n "${LATEST_TAG}" ]; then
              CURRENT_VERSION="${LATEST_TAG#${crate}-v}"
              echo "  Latest tag: ${LATEST_TAG}"
              echo "  Current version: ${CURRENT_VERSION}"
            else
              CURRENT_VERSION=""
              echo "  No existing tags found for ${crate}"
            fi

            if [ -n "${BUMPED_BARE}" ] && [ "${BUMPED_BARE}" != "${CURRENT_VERSION}" ]; then
              echo "  Version changed: ${CURRENT_VERSION} -> ${BUMPED_BARE}"
              ANY_BUMPED="true"

              # Update version in Cargo.toml (only the first occurrence)
              echo "  Updating crates/${crate}/Cargo.toml version to ${BUMPED_BARE}..."
              sed -i "0,/^version = \".*\"/s//version = \"${BUMPED_BARE}\"/" "crates/${crate}/Cargo.toml"

              # Generate changelog
              echo "  Generating changelog for ${crate}..."
              git cliff --tag-pattern "^${crate}-v" --include-path "crates/${crate}/**" -o "crates/${crate}/CHANGELOG.md" --bump
            else
              echo "  No version change for ${crate}, skipping."
            fi

            echo "::endgroup::"
          done

          echo "any_bumped=${ANY_BUMPED}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        if: steps.bump.outputs.any_bumped == 'true'
        run: cargo check --workspace

      - name: Create or update Release PR
        if: steps.bump.outputs.any_bumped == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/automated
          title: "chore(release): prepare release"
          commit-message: "chore(release): prepare release"
          labels: release
          body: |
            Automated release PR with version bumps and changelog updates.

            This PR was generated by the release workflow.
